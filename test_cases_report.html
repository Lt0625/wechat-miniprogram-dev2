        * {

            padding: 0;

        }
        .container {

            margin: 0 auto;
            padding: 20px;
        }
        /* 头部 */
        .header {

            padding: 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
        }

            font-size: 32px;
            margin-bottom: 10px;
        }
        .header .subtitle {
            opacity: 0.9;
            font-size: 16px;
        }
        .header .timestamp {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
        }
        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card .number {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card.passed .number {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card.failed .number {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        /* 模块统计 */
        .module-summary {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .module-summary h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .module-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .module-item .name {
            font-weight: 500;
        }
        .module-item .count {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        /* 用例列表 */
        .test-cases {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .test-cases h2 {
            padding: 20px 25px;
            font-size: 18px;
            border-bottom: 1px solid #eee;
            background: #fafbfc;
        }
        .suite-group {
            border-bottom: 1px solid #eee;
        }
        .suite-header {
            padding: 15px 25px;
            background: #f8f9fa;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .suite-header:hover {
            background: #f0f2f5;
        }
        .suite-header .suite-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .suite-header .badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: normal;
        }
        .suite-header .expand-icon {
            transition: transform 0.3s;
        }
        .suite-header.expanded .expand-icon {
            transform: rotate(180deg);
        }
        .suite-cases {
            display: none;
        }
        .suite-cases.expanded {
            display: block;
        }
        .case-item {
            padding: 12px 25px;
            display: grid;
            grid-template-columns: 120px 1fr 80px 100px;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #f5f5f5;
        }
        .case-item:last-child {
            border-bottom: none;
        }
        .case-item:hover {
            background: #fafbfc;
        }
        .case-id {
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
        }
        .case-name {
            color: #333;
        }
        .case-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .case-status.pass {
            background: #d4edda;
            color: #155724;
        }
        .case-status.fail {
            background: #f8d7da;
            color: #721c24;
        }
        .case-time {
            font-size: 12px;
            color: #999;
            text-align: right;
        }
        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 13px;
        }
        /* 响应式 */
        @media (max-width: 768px) {
            .case-item {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

        // 渲染模块统计
        function renderModuleSummary() {
            const moduleCounts = {};
            testResults.forEach(item => {
                moduleCounts[item.suite] = (moduleCounts[item.suite] || 0) + 1;
            });

            const grid = document.getElementById('moduleGrid');
            grid.innerHTML = Object.entries(moduleCounts).map(([name, count]) => `
                <div class="module-item">
                    <span class="name">${name}</span>
                    <span class="count">${count}个</span>
                </div>
            `).join('');
        }

        // 渲染用例列表
        function renderTestCases() {
            const moduleCases = {};
            testResults.forEach(item => {
                if (!moduleCases[item.suite]) {
                    moduleCases[item.suite] = [];
                }
                moduleCases[item.suite].push(item);
            });

            const container = document.getElementById('testCases');
            container.innerHTML = Object.entries(moduleCases).map(([suiteName, cases]) => `
                <div class="suite-group">
                    <div class="suite-header expanded" onclick="toggleSuite(this)">
                        <div class="suite-name">
                            ${suiteName}
                            <span class="badge">${cases.length}个用例</span>
                        </div>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="suite-cases expanded">
                        ${cases.map(item => `
                            <div class="case-item">
                                <span class="case-id">${item.case_id}</span>
                                <span class="case-name">${item.name}</span>
                                <span class="case-status ${item.status.toLowerCase()}">${item.status === 'PASS' ? '✅ 通过' : '❌ 失败'}</span>
                                <span class="case-time">${item.detail}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 折叠/展开
        function toggleSuite(header) {
            header.classList.toggle('expanded');
            header.nextElementSibling.classList.toggle('expanded');
        }

        // 初始化
        renderModuleSummary();
        renderTestCases();

</html>
